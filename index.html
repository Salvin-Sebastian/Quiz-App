<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizzer - Test Your Knowledge</title>
  <meta name="description" content="A beautiful and interactive quiz application built with HTML, CSS, and JS.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <div id="quiz-container" class="glass-card">
      
      <!-- Start Screen -->
      <div id="start-screen" class="screen active">
        <h1>Quizzer</h1>
        <p>Test your web development knowledge.</p>
        <button id="start-btn" class="btn primary-btn">Start Quiz</button>
      </div>

      <!-- Quiz Screen -->
      <div id="quiz-screen" class="screen">
        <div class="header">
          <span id="question-tracker">Question 1/5</span>
          <span id="score-tracker">Score: 0</span>
        </div>
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
        
        <h2 id="question-text">Question goes here</h2>
        
        <div id="options-container">
          <!-- Options will be injected here via JS -->
        </div>

        <button id="next-btn" class="btn secondary-btn hidden">Next Question</button>
      </div>

      <!-- Result Screen -->
      <div id="result-screen" class="screen">
        <h2>Quiz Completed!</h2>
        <div class="score-display">
          <span id="final-score" class="score-number">0</span>
          <span class="score-text">out of <span id="total-questions">0</span></span>
        </div>
        <div class="summary-container" id="summary-container">
          <!-- Summary goes here -->
        </div>
        <button id="restart-btn" class="btn primary-btn">Restart Quiz</button>
      </div>

    </div>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
